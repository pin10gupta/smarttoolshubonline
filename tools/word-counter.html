<!DOCTYPE html>
<html>
<head>
<title>Word Counter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Word Counter</h1>
<nav><a href="index.html">Home</a></nav>
</header>

<main>

<div class="card">
<textarea id="text" rows="6"></textarea>
<button onclick="countWords()">Count</button>

<p>Words: <span id="words">0</span></p>
<p>Characters: <span id="chars">0</span></p>
</div>

</main>

<script>
function countWords(){
let t=document.getElementById("text").value;
document.getElementById("words").innerText=t.trim().split(/\s+/).filter(Boolean).length;
document.getElementById("chars").innerText=t.length;
}
</script>

<footer><p>© 2026 @ Pintu Gupta</p></footer>

</body>
</html>
